<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Unregelmäßige Verben - Vokabelspiel</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; margin:0; padding:0; transition: background 0.5s;}
h1 { margin-top:20px; transition: color 0.5s;}
#themeSelector { margin:10px; padding:5px; font-size:16px;}
#status { display:flex; justify-content:center; gap:20px; margin:20px; transition: background 0.5s; flex-wrap:wrap;}

/* --- Boxen zentriert --- */
.box {
display: flex;
justify-content: center;
align-items: center;
text-align: center;
padding:10px 20px;
border-radius:12px;
font-weight:bold;
font-size:18px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
transition:all 0.5s;
}

#wort {
  font-size:32px;
  margin:20px;
  font-weight:bold;
  text-align:center;

  display: block;   /* 👉 KEIN flex mehr */
}
/* --- Antwortbuttons 2x2, größere Größe, zentriert --- */
#antworten {
display: grid;
grid-template-columns: repeat(2, auto);
gap: 10px;
justify-content: center;
margin: 10px 0;
}
#antworten button {
display: flex;
justify-content: center;
align-items: center;
text-align: center;
padding: 12px 20px;
font-size: 28px;
border-radius: 12px;
min-width: 200px;
max-width: 250px;
cursor: pointer;
transition: all 0.3s;
white-space: nowrap;
}
#antworten button:hover { transform:scale(1.05); }

#feedback { font-size:24px; margin-top:15px; height:30px; transition:all 0.3s;}
#timerBarContainer, #progressContainer { width:60%; height:20px; border-radius:10px; margin:10px auto; overflow:hidden; background:#ccc; transition:all 0.5s;}
#timerBar, #progressBar { height:100%; width:100%; transition: width 0.1s linear;}
#leben { font-size:24px; margin:10px; }

/* Top 3 Farben */
.gold {
  color: #FFD700;
  font-weight: bold;
}

.silver {
  color: #C0C0C0;
  font-weight: bold;
}

.bronze {
  color: #cd7f32;
  font-weight: bold;
}

/* Dein eigener Score */
.me {
  background: rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 2px 6px;
}

/* --- NEU: Layout nebeneinander --- */
#gameWrapper {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 0px;
  margin-top: 20px;
position: relative; 
}

#gameArea {
  display: flex;
  flex-direction: column;
  align-items: center;

}

#highscoresContainer {
position: absolute;
  right: 40px;   /* 👉 Abstand vom rechten Rand */
  top: 0;
}

.highscoreBox {
  position: sticky;
  top: 80px;
}

/* --- Wort-Highlight sauber zentriert --- */
.wort-box {
  background: linear-gradient(135deg, #ff9800, #ff5722);
  color: white;

  padding: 15px 25px;
  border-radius: 15px;

  font-size: 36px;   /* 👉 kleiner */
  font-weight: bold;

  box-shadow: 0 6px 15px rgba(0,0,0,0.25);

  display: block;            /* 👉 GANZE ZEILE */
  width: fit-content;        /* 👉 Größe nur so groß wie Inhalt */
  margin: 0 auto 20px auto;  /* 👉 perfekt zentriert */

  letter-spacing: 1px;
}


/* --- ZENTRIERUNG DES SPIELS --- */
#mainCenter {
  max-width: 900px;     /* 👉 schöne Spielbreite */
  margin: 0 auto;       /* 👉 horizontal zentriert */
  text-align: center;
}
#timerBarContainer,
#progressContainer {
  display: none;
}
#highscoresContainer {
  display: none;
}






.highscore-title {
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 12px;   /* 👉 Abstand nach unten */
 text-transform: uppercase;
  letter-spacing: 1px;
}

.highscore-entry {
  margin: 4px 0;         /* 👉 Abstand zwischen Einträgen */
  padding: 2px 0;
}

.highscoreBox {
  text-align:left;
  max-width:220px;
  padding:15px;
  border-radius:12px;

  margin-top: 10px;   /* 👉 Abstand nach unten */
  
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}
/* --- Popups --- */
#top10Popup {
display:none;
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#ffeb3b;
color:#000;
padding:20px;
border-radius:15px;
font-size:24px;
font-weight:bold;
box-shadow:0 0 20px rgba(0,0,0,0.5);
z-index:10000;
text-align:center;
}
#timeOverPopup, #overlay {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:30px 50px;
border-radius:20px;
font-size:28px;
font-weight:bold;
box-shadow:0 0 30px rgba(0,0,0,0.7);
z-index:10000;
text-align:center;
}
#timeOverPopup { background:#ff4444; color:#fff; }
#overlay { top:0; left:0; transform:none; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9000; }

.correct-answer-highlight {
color:#00ff00;
font-weight:bold;
font-size:32px;
}
.error-icon {
  width: 70px;
  height: 70px;
  background: white;
  color: red;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  margin: 0 auto 10px auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

/* --- Tag/Nacht Styles --- */
.day { background: linear-gradient(to bottom,#e0f7fa,#b2ebf2); color:#004d40;}
.night { background:#1a1a2e; color:#f0f0f0;}
.day .box { background:#ffffffaa; color:#004d40;}
.night .box { background:#333366; color:#f0f0f0;}
.day #antworten button { background:#80cbc4; color:#004d40;}
.night #antworten button { background:#4444aa; color:#fff;}
.day #timerBar { background:#00796b; }
.night #timerBar { background:#448aff; }
.day #progressBar.level2 { background:#4caf50; }
.night #progressBar.level2 { background:#2e7d32; }
/* Highscore Tag/Nacht */
.day .highscoreBox { background:#f0f0f0; color:#004d40; }
.night .highscoreBox { background:#333366; color:#fff; }

/* Farbige Buttons */
.green { background:#4caf50; color:#fff;}
.yellow { background:#ffeb3b; color:#000;}
.red { background:#f44336; color:#fff;}
.correct-answer { color: #00ff00; font-weight:bold; }

.deutsches-wort {
  color: orange;
  font-size: 44px;      /* 👉 größer */
  font-weight: bold;
 width: 100%;
  margin-bottom: 20px;  /* 👉 mehr Abstand nach unten */
}

/* --- ✅ NEU: LOGO oben links --- */
#logo {
position: fixed;
top: 10px;
left: 10px;
width: 360px;
height: auto;
z-index: 1000;
opacity: 0.9;
transition: all 0.3s;
}
#logo:hover {
transform: scale(1.05);
opacity: 1;
}
.night #logo {
filter: brightness(1.2);
} </style>

</head>
<body class="day">

<!-- ✅ NEU: Logo -->

<img src="logo.png" id="logo">

<h1>Unregelmäßige Verben - Vokabelspiel 🎮</h1>

<select id="themeSelector">
<option value="day">Tagesmodus</option>
<option value="night">Nachtmodus</option>
</select>

<div id="startScreen">
<label>Dein Name: <input id="playerName" placeholder="Name eingeben"></label><br>
<label>Gesamtzeit wählen:
<select id="timeSelector">
<option value="60">1 Minute</option>
<option value="180">3 Minuten</option>
<option value="300">5 Minuten</option>
</select>
</label><br>
<button id="startBtn">Spiel starten</button>
</div>

<div id="gameWrapper">

  <div id="gameArea">

	<div id="status" style="display:none;">
	<div class="box">Kategorie: unregelmäßige Verben</div>
	<div class="box">Punkte: <span id="punkte">0</span></div>
	<div class="box">Gesamtzeit: <span id="gesamtzeit">0</span> s</div>
	<div id="leben" class="box">❤️❤️❤️</div>
	</div>

	<div id="wort"></div>
	<div id="timerBarContainer"><div id="timerBar"></div></div>
	<div id="progressContainer"><div id="progressBar" class="level2"></div></div>
	<div id="antworten"></div>
	<div id="feedback"></div>

	</div>

<div id="highscoresContainer">
  <div id="highscoreList2" class="highscoreBox"></div>
	</div>

</div>

<div id="top10Popup"></div>
<div id="overlay"></div>
<div id="timeOverPopup"></div>

<audio id="richtig" src="https://freesound.org/data/previews/320/320654_5260870-lq.mp3"></audio> <audio id="falsch" src="https://freesound.org/data/previews/82/82921_1022653-lq.mp3"></audio>

<script>
// --- Theme ---
document.getElementById("themeSelector").addEventListener("change", e=>{document.body.className=e.target.value;});

// --- Shuffle ---
function shuffleArray(array){ for(let i=array.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [array[i],array[j]]=[array[j],array[i]];}}

// --- Verben ---
let level2=[["sein","be","was/were","been"],["haben","have","had","had"],["werden","become","became","become"],["beginnen","begin","began","begun"],["brechen","break","broke","broken"],["bringen","bring","brought","brought"],["wählen","choose","chose","chosen"],["kommen","come","came","come"],["kosten","cost","cost","cost"],["schneiden","cut","cut","cut"],["tun","do","did","done"],["trinken","drink","drank","drunk"],["essen","eat","ate","eaten"],["fallen","fall","fell","fallen"],["fühlen","feel","felt","felt"],["finden","find","found","found"],["fliegen","fly","flew","flown"],["vergessen","forget","forgot","forgotten"],["bekommen","get","got","gotten"],["geben","give","gave","given"],["gehen","go","went","gone"],["haben","have","had","had"],["hören","hear","heard","heard"],["halten","hold","held","held"],["lernen","learn","learnt","learnt"],["lassen","let","let","let"],["liegen","lie","lay","lain"],["verlieren","lose","lost","lost"],["machen","make","made","made"],["meinen","mean","meant","meant"],["treffen","meet","met","met"],["zahlen","pay","paid","paid"],["legen","put","put","put"],["lesen","read","read","read"],["laufen","run","ran","run"],["sagen","say","said","said"],["sehen","see","saw","seen"],["verkaufen","sell","sold","sold"],["schicken","send","sent","sent"],["setzen","set","set","set"],["schreiben","write","wrote","written"],["schwimmen","swim","swam","swum"],["nehmen","take","took","taken"],["lehren","teach","taught","taught"],["erzählen","tell","told","told"],["denken","think","thought","thought"],["verstehen","understand","understood","understood"],["tragen","wear","wore","worn"],["gewinnen","win","won","won"],["wachsen","grow","grew","grown"],["ziehen","pull","pulled","pulled"]];

// --- Spielvariablen ---
let punkte=0, aktuelleFrage=0, zeit=10, timerID, leben=3, playerName="";
let gesamtSpielZeit=60, gesamtSekunden=0, gesamtTimerID;

// --- Highscore ---
function getHighscores(){ return JSON.parse(localStorage.getItem("vokabelHighscores_level2")||"[]"); }
function saveHighscores(hs){ localStorage.setItem("vokabelHighscores_level2",JSON.stringify(hs)); }
function updateAllHighscores(){ let hs=getHighscores(); hs.sort((a,b)=>b.punkte-a.punkte); let html = "<div class='highscore-title'>🏆 Highscore</div>"; 

hs.slice(0,10).forEach((e,i)=>{
  let klasse = "highscore-entry";

  if(i === 0) klasse += " gold";
  else if(i === 1) klasse += " silver";
  else if(i === 2) klasse += " bronze";

  if(e.name === playerName) klasse += " me";

let medal = ["🥇","🥈","🥉"][i] || "";
html += `<div class="${klasse}">${medal} ${i+1}. ${e.name}: ${e.punkte}</div>`;});

document.getElementById("highscoreList2").innerHTML = html; }

// --- Popups ---
function showTop10Popup(name,punkte,rang){
  const popup=document.getElementById("top10Popup");
  popup.innerHTML=`🎉 Glückwunsch ${name}! <br> Rang ${rang} in den Top 10! <br> Punkte: ${punkte}`;
  popup.style.display="block";
  setTimeout(()=>{popup.style.display="none";},4000);
}

// --- Start ---
document.getElementById("startBtn").onclick=function(){

document.getElementById("highscoresContainer").style.display = "block";
document.getElementById("timerBarContainer").style.display = "block";
document.getElementById("progressContainer").style.display = "block";

  playerName=document.getElementById("playerName").value.trim()||"Spieler";
  gesamtSpielZeit=parseInt(document.getElementById("timeSelector").value);
  shuffleArray(level2);
  document.getElementById("startScreen").style.display="none";
  document.getElementById("status").style.display="flex";
  updateLebenAnzeige(); updateAllHighscores(); startGesamtTimer(); starteFrage();
}

// --- Timer ---
function updateTimerBar(){document.getElementById("timerBar").style.width=(zeit/10*100)+"%";}
function startTimer(){ clearInterval(timerID); zeit=10; updateTimerBar();
  timerID=setInterval(()=>{
    zeit-=0.1;
    if(zeit<0) zeit=0;
    updateTimerBar();
    if(zeit===0){ clearInterval(timerID); zeitAbgelaufen(); }
  },100);
}

// --- Popups und Antworten ---
function zeitAbgelaufen(){
  const w = level2[aktuelleFrage];
  const formIndex = Math.floor(Math.random()*3);
  const correct = w[formIndex+1];
  document.getElementById("overlay").style.display="block";
  const popup=document.getElementById("timeOverPopup");
  popup.innerHTML=`⏰ Zeit abgelaufen!<br>Richtige Antwort: <span class="correct-answer-highlight">${correct}</span>`;
  popup.style.display="block";
 setTimeout(()=>{
  document.getElementById("overlay").style.display="none";
  popup.style.display="none";

  // ❗ KEIN zweites Popup mehr
  leben--;
  updateLebenAnzeige();

  if(leben <= 0){
    spielZurücksetzen();
  } else {
    nächsteFrage();
  }

},4000);
}

document.getElementById("richtig").volume=0.3;
document.getElementById("falsch").volume=0.3;

function updateLebenAnzeige(){ let str=""; for(let i=0;i<leben;i++) str+="❤️"; document.getElementById("leben").innerHTML=str; }

function startGesamtTimer(){ clearInterval(gesamtTimerID); gesamtSekunden=0; document.getElementById("gesamtzeit").innerText=gesamtSekunden;
  gesamtTimerID=setInterval(()=>{
    gesamtSekunden++; document.getElementById("gesamtzeit").innerText=gesamtSekunden;
    if(gesamtSekunden>=gesamtSpielZeit){ clearInterval(gesamtTimerID);
      document.getElementById("overlay").style.display="block";
      const popup=document.getElementById("timeOverPopup");
      popup.innerHTML=`⏰ Gesamtzeit abgelaufen!<br>Punkte: ${punkte}`;
      popup.style.display="block";
      setTimeout(()=>{
        document.getElementById("overlay").style.display="none";
        popup.style.display="none";
        addHighscore(playerName,punkte);
        punkte=0; aktuelleFrage=0; leben=3; document.getElementById("punkte").innerText=0; document.getElementById("gesamtzeit").innerText=0; updateLebenAnzeige(); startGesamtTimer(); starteFrage();
      },4000);
    }
  },1000);
}

// --- Highscore Funktionen ---
function addHighscore(name,punkte){
  let hs=getHighscores();
  hs.push({name,punkte}); hs.sort((a,b)=>b.punkte-a.punkte);
  if(hs.length>10) hs=hs.slice(0,10);
  saveHighscores(hs); updateAllHighscores();
  let rang=hs.findIndex(e=>e.name===name && e.punkte===punkte)+1;
  if(rang>0 && rang<=10) showTop10Popup(name,punkte,rang);
}

// --- Spiel zurücksetzen ---
function spielZurücksetzen(){ clearInterval(gesamtTimerID); alert("Keine Leben mehr! Spiel wird zurückgesetzt."); addHighscore(playerName,punkte); punkte=0; aktuelleFrage=0; leben=3; document.getElementById("punkte").innerText=punkte; document.getElementById("gesamtzeit").innerText=0; updateLebenAnzeige(); startGesamtTimer(); starteFrage(); }

// --- Frage ---
function starteFrage(){
  clearInterval(timerID);
  document.getElementById("feedback").innerText="";
  document.getElementById("antworten").innerHTML="";
  updateProgress();
  if(aktuelleFrage>=level2.length) aktuelleFrage=0;
  
  const w = level2[aktuelleFrage];
  const formIndex = Math.floor(Math.random() * 3); 
  const formNames = ["Infinitive", "Simple Past", "Past Participle"];
  const colors = ["green", "yellow", "red"];
  
  let formBlocks = "";
  formNames.forEach((name, i) => {
    if(i === formIndex) formBlocks += `<span class="${colors[i]}" style="padding:5px 10px; margin:0 5px; border-radius:8px; font-weight:bold;">${name}</span>`;
    else formBlocks += `<span style="padding:5px 10px; margin:0 5px; border-radius:8px; background:#ccc; color:#333;">${name}</span>`;
  });

document.getElementById("wort").innerHTML = `
<div class="wort-box">${w[0]}</div>
<div>${formBlocks}</div>
`;
  const correct = w[formIndex + 1];
  let options = [correct];
  for(let i=0;i<=2;i++){
    if(i !== formIndex && w[i+1] && !options.includes(w[i+1])) options.push(w[i+1]);
  }
  while(options.length < 4){
    let candidate = level2[Math.floor(Math.random()*level2.length)][formIndex + 1];
    if(!options.includes(candidate) && candidate[0] !== w[0]) options.push(candidate);
  }
  shuffleArray(options);
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.classList.add(colors[formIndex]);
    btn.onclick = () => checkAntwort(opt, correct);
    document.getElementById("antworten").appendChild(btn);
  });
  
  startTimer();
}

// --- Antwort prüfen ---
function checkAntwort(eingabe,richtig){ clearInterval(timerID); if(eingabe===richtig) richtigAntwort(); else falschAntwort(richtig);}
function richtigAntwort(){document.getElementById("feedback").innerText="Richtig! 🎉"; document.getElementById("richtig").currentTime=0; document.getElementById("richtig").play(); punkte++; document.getElementById("punkte").innerText=punkte; nächsteFrage();}
function falschAntwort(richtig){
  leben--; updateLebenAnzeige(); 
  const popup=document.getElementById("timeOverPopup");
  document.getElementById("overlay").style.display="block";

popup.innerHTML=`
<div class="error-icon">✖</div>
<span class="correct-answer-highlight">${richtig}</span>
`;

popup.style.display="block";
  document.getElementById("falsch").currentTime=0; document.getElementById("falsch").play();
  setTimeout(()=>{
    document.getElementById("overlay").style.display="none"; popup.style.display="none";
    if(leben<=0) spielZurücksetzen(); else nächsteFrage();
  },4000);
}
function nächsteFrage(){aktuelleFrage++; starteFrage();}
function updateProgress(){ const pr = ((aktuelleFrage+1)/level2.length)*100; document.getElementById("progressBar").style.width=pr+"%";}
</script>

</body>
<div id="mainCenter">
<img src="logo.png" id="logo">

<div id="mainCenter">


  <div id="startScreen"></div>

  <div id="gameWrapper">
    <div id="gameArea">

    </div>
  </div>

  <div id="top10Popup"></div>
  <div id="overlay"></div>
  <div id="timeOverPopup"></div>

</div>

<!-- Highscore bleibt draußen -->
<div id="highscoresContainer"></div>
</div>

</html>
